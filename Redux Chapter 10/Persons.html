<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Persons</title>
    <!-- Importing Redux via CDN to use global Redux functions -->
    <script src="https://unpkg.com/redux@4.0.1/dist/redux.js"></script>
</head>

<body>
    <script>
        // =========================================================================
        // 1. ACTION CREATORS
        // Functions that return an action object with a 'type' and a payload.
        // =========================================================================

        // Adds a new person object to the state
        function addPerson(id, name, age) {
            return {
                type: "ADD",
                personData: {
                    id: id,
                    name: name,
                    age: age
                }
            }
        }

        // Removes a person from the state using their unique ID
        function removePerson(id) {
            return {
                type: "REMOVE",
                personId: id
            }
        }

        // =========================================================================
        // 2. INITIAL STATE & REDUCER
        // The reducer manages state transitions based on dispatched actions.
        // =========================================================================

        // The starting structure for our application state
        const initialState = {
            persons: []
        };

        function reducer(state, action) {
            // Fallback to initialize the state if it's currently undefined
            if (state === undefined) {
                state = initialState;
            }

            // Handle adding a person immutably
            if (action.type === "ADD") {
                const newPerson = {
                    id: action.personData.id,
                    name: action.personData.name,
                    age: action.personData.age
                }
                return {
                    ...state, // Copy existing state properties
                    persons: state.persons.concat(newPerson) // Create a new array with the added person
                }
            } 
            // Handle removing a person immutably
            else if (action.type === "REMOVE") {
                return {
                    ...state,
                    // Filter out the person with the matching ID, creating a new array
                    persons: state.persons.filter(person => person.id !== action.personId)
                }
            } 
            // Return the current state unchanged if the action type doesn't match
            else {
                return state;
            }
        }

        // =========================================================================
        // 3. STORE CREATION & SUBSCRIPTION
        // Holding the state tree and listening for updates.
        // =========================================================================

        // Create the Redux store and pass in the reducer function
        var store = Redux.createStore(reducer);

        // Subscribe a callback function to the store. 
        // This runs automatically every single time an action is successfully dispatched.
        store.subscribe(showState);

        // Helper function to log the updated state to the browser console
        function showState() {
            console.log(store.getState());
        }

        // =========================================================================
        // 4. DISPATCHING ACTIONS
        // Triggering state changes by sending actions to the store.
        // =========================================================================

        // Dispatching 4 distinct ADD actions to populate the array
        store.dispatch(addPerson(1, "Greg", 5));
        store.dispatch(addPerson(2, "Carol", 3));
        store.dispatch(addPerson(3, "Gabriel", 6));
        store.dispatch(addPerson(4, "Fred", 8));

        // Dispatching a REMOVE action to delete Fred (ID: 4) from the state
        store.dispatch(removePerson(4));
    </script>
</body>

</html>
